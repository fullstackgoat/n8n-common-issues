# Working reverse proxy config for n8n.
# Key additions over nginx.conf: Upgrade/Connection headers + long timeouts.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    # n8n UI uses long-lived requests (executions, streaming, websockets).
    # Without these, the UI shows "Connection lost" every few seconds.
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_connect_timeout 60s;

    # Don't buffer streaming responses (AI nodes, executions tail, SSE).
    proxy_buffering off;
    proxy_request_buffering off;

    # Reasonable upload size for binary data, file nodes, PDFs.
    client_max_body_size 32m;

    location / {
        proxy_pass http://n8n:5678;
        proxy_http_version 1.1;

        # WebSocket upgrade — this is the line that fixes "Connection lost".
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
    }
}
