# BROKEN reverse proxy config — missing WebSocket upgrade headers.
# This is what causes "Connection lost" to appear and never recover in the n8n UI.
# See nginx.fixed.conf for the working version.

server {
    listen 80;
    server_name _;

    location / {
        proxy_pass http://n8n:5678;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # MISSING: Upgrade / Connection headers required for WebSockets.
        # MISSING: Long timeouts required for streaming responses.
    }
}
