name: n8n-repro-01-webhook-url-fixed

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    restart: unless-stopped
    expose:
      - "5678"
    environment:
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE}
      - N8N_BASIC_AUTH_ACTIVE=${N8N_BASIC_AUTH_ACTIVE}
      - N8N_RUNNERS_ENABLED=${N8N_RUNNERS_ENABLED}
      - N8N_DIAGNOSTICS_ENABLED=${N8N_DIAGNOSTICS_ENABLED}
      # --- THE FIX: tell n8n what its public-facing URL is. ---
      - N8N_HOST=${PUBLIC_HOST}
      - N8N_PROTOCOL=http
      - N8N_PORT=5678
      - WEBHOOK_URL=http://${PUBLIC_HOST}:${PUBLIC_PORT}/
      - N8N_EDITOR_BASE_URL=http://${PUBLIC_HOST}:${PUBLIC_PORT}/
      # If you sit behind multiple proxies (e.g. Cloudflare → nginx → n8n), uncomment:
      # - N8N_PROXY_HOPS=1
    volumes:
      - n8n_data:/home/node/.n8n

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - n8n
    ports:
      - "${PUBLIC_PORT}:80"
    volumes:
      # Fixed nginx config with WebSocket upgrade headers + sane timeouts.
      - ./nginx.fixed.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  n8n_data:
