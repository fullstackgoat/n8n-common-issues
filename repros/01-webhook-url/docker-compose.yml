name: n8n-repro-01-webhook-url-broken

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    restart: unless-stopped
    expose:
      - "5678"
    environment:
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE}
      - N8N_BASIC_AUTH_ACTIVE=${N8N_BASIC_AUTH_ACTIVE}
      - N8N_RUNNERS_ENABLED=${N8N_RUNNERS_ENABLED}
      - N8N_DIAGNOSTICS_ENABLED=${N8N_DIAGNOSTICS_ENABLED}
      # NOTE: WEBHOOK_URL / N8N_HOST / N8N_PROTOCOL deliberately UNSET here.
      # This is what reproduces the bug. See docker-compose.fixed.yml for the fix.
    volumes:
      - n8n_data:/home/node/.n8n

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - n8n
    ports:
      - "${PUBLIC_PORT}:80"
    volumes:
      # Broken nginx config: missing WebSocket upgrade headers.
      # n8n's UI will display "Connection lost" banner because of this.
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  n8n_data:
