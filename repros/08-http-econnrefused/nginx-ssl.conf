# nginx config for the self-signed-cert HTTPS server in Repro 08, scenario 3.
# Cert is generated on first compose-up by the `cert-init` service into the
# `certs` named volume; this server reads it from the same volume.

server {
    listen 443 ssl;
    server_name self-signed self-signed-server localhost;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    location / {
        # Identify ourselves clearly so the workflow can verify the
        # response actually came from this server (not a transparent proxy).
        add_header X-Repro "08-self-signed-server" always;
        return 200 '{"server":"self-signed-nginx","tls":"self-signed","status":"ok"}\n';
        default_type application/json;
    }
}

# A plain-HTTP listener on :80 too, so we can sanity-check the container
# is up without involving TLS at all.
server {
    listen 80;
    server_name self-signed self-signed-server localhost;

    location /ping {
        return 200 'pong\n';
        default_type text/plain;
    }
}
