name: n8n-repro-08-http-econnrefused-fixed

# The same stack as docker-compose.yml, with three changes to the n8n
# service:
#
#   1. extra_hosts adds host.docker.internal mapped to the host gateway,
#      so the workflow can use http://host.docker.internal:11434/ to
#      reach a service published on the host (the canonical Ollama-on-
#      host fix). Required on Linux; harmless on macOS / Windows
#      (Docker Desktop already has it).
#
#   2. HTTP_PROXY / HTTPS_PROXY / NO_PROXY env vars route outbound
#      requests through the squid container. Squid sits on both
#      `public` and `private` networks, so it can reach `internal-api`
#      even though n8n on `public` alone cannot.
#
#      NO_PROXY excludes the names that ARE on n8n's network (the
#      Docker DNS works for those — we don't want to round-trip them
#      through the proxy unnecessarily, and some Node libs treat the
#      proxy as a fall-through rather than an override).
#
#   3. NODE_EXTRA_CA_CERTS points Node.js at the cert generated by
#      cert-init. Once Node trusts the CA, the HTTPS handshake to
#      self-signed-nginx succeeds without disabling TLS verification.
#      Compare with NODE_TLS_REJECT_UNAUTHORIZED=0, which works but
#      disables TLS for ALL outbound HTTPS — see WORKAROUND.md.

services:

  # --- The n8n container under test (fixed) ----------------------------
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "${PUBLIC_PORT:-5678}:5678"
    extra_hosts:
      # --- THE FIX, part 1: host.docker.internal on Linux ---
      - "host.docker.internal:host-gateway"
    environment:
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE}
      - N8N_BASIC_AUTH_ACTIVE=${N8N_BASIC_AUTH_ACTIVE}
      - N8N_RUNNERS_ENABLED=${N8N_RUNNERS_ENABLED}
      - N8N_DIAGNOSTICS_ENABLED=${N8N_DIAGNOSTICS_ENABLED}
      # --- THE FIX, part 2: route outbound HTTP(S) via squid ---
      - HTTP_PROXY=http://squid:3128
      - HTTPS_PROXY=http://squid:3128
      - NO_PROXY=localhost,127.0.0.1,n8n,fake-ollama,self-signed,self-signed-server,self-signed.local,host.docker.internal
      # --- THE FIX, part 3: trust the self-signed CA ---
      - NODE_EXTRA_CA_CERTS=/certs/server.crt
    volumes:
      - n8n_data:/home/node/.n8n
      # Mount the same certs volume that nginx serves from, read-only.
      - certs:/certs:ro
    networks:
      - public
    depends_on:
      cert-init:
        condition: service_completed_successfully

  # --- Below this line: identical to docker-compose.yml ----------------
  fake-ollama:
    image: traefik/whoami:latest
    restart: unless-stopped
    command: ["--port=80", "--name=fake-ollama"]
    ports:
      - "11434:80"
    networks:
      - public

  squid:
    image: ubuntu/squid:latest
    restart: unless-stopped
    volumes:
      - ./squid.conf:/etc/squid/squid.conf:ro
    networks:
      - public
      - private

  internal-api:
    image: traefik/whoami:latest
    restart: unless-stopped
    command: ["--port=80", "--name=internal-api"]
    networks:
      - private

  cert-init:
    image: alpine/openssl:latest
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        if [ ! -f /certs/server.crt ]; then
          echo "cert-init: generating self-signed cert"
          openssl req -x509 -newkey rsa:2048 -nodes \
            -keyout /certs/server.key \
            -out    /certs/server.crt \
            -days 365 \
            -subj "/CN=self-signed.local" \
            -addext "subjectAltName=DNS:self-signed,DNS:self-signed-server,DNS:self-signed.local,DNS:localhost"
          chmod 0644 /certs/server.crt
          chmod 0644 /certs/server.key
        else
          echo "cert-init: cert already present, skipping"
        fi
    volumes:
      - certs:/certs

  self-signed-nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ./nginx-ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - certs:/etc/nginx/certs:ro
    networks:
      public:
        aliases:
          - self-signed
          - self-signed-server
          - self-signed.local
    depends_on:
      cert-init:
        condition: service_completed_successfully

networks:
  public:
  private:

volumes:
  n8n_data:
  certs:
