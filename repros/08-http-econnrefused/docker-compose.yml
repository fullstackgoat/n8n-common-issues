name: n8n-repro-08-http-econnrefused-broken

# This stack reproduces three HTTP-from-inside-the-container failures
# that flood community.n8n.io. Three things are DELIBERATELY MISSING
# from the n8n service config:
#
#   1. No `extra_hosts: ["host.docker.internal:host-gateway"]`.
#                              → on Linux, `host.docker.internal` does
#                                not resolve, so the Ollama-on-host
#                                workaround can't even be tried.
#   2. No `HTTP_PROXY` / `HTTPS_PROXY` env vars.
#                              → n8n's HTTP node has no route to
#                                anything on the `private` network
#                                (e.g. `internal-api`).
#   3. No `NODE_EXTRA_CA_CERTS` (and no cert bind-mount).
#                              → Node.js rejects the self-signed cert
#                                served by `self-signed-nginx`.
#
# Everything else in the stack (squid, fake-ollama, internal-api,
# self-signed-nginx, cert-init) is identical to docker-compose.fixed.yml,
# so flipping between the two changes only n8n's environment.

services:

  # --- The n8n container under test (broken) ---------------------------
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "${PUBLIC_PORT:-5678}:5678"
    environment:
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE}
      - N8N_BASIC_AUTH_ACTIVE=${N8N_BASIC_AUTH_ACTIVE}
      - N8N_RUNNERS_ENABLED=${N8N_RUNNERS_ENABLED}
      - N8N_DIAGNOSTICS_ENABLED=${N8N_DIAGNOSTICS_ENABLED}
      # NOTE: no HTTP_PROXY / HTTPS_PROXY / NO_PROXY here.
      # NOTE: no NODE_EXTRA_CA_CERTS here.
    # NOTE: no `extra_hosts:` here.
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - public
    depends_on:
      cert-init:
        condition: service_completed_successfully

  # --- A fake "Ollama on the host" target ------------------------------
  # `traefik/whoami` listens on :80 and prints request details. We map
  # 11434 on the host → 80 in the container so that any process on the
  # host can reach it as `localhost:11434`. From inside n8n's container
  # `localhost` is n8n itself; `host.docker.internal:11434` (with proper
  # extra_hosts) reaches the host network and back into this container.
  fake-ollama:
    image: traefik/whoami:latest
    restart: unless-stopped
    command: ["--port=80", "--name=fake-ollama"]
    ports:
      - "11434:80"
    networks:
      - public

  # --- Corporate forward proxy ----------------------------------------
  # On both `public` (so n8n can reach it) and `private` (so it can
  # reach internal-api). Without HTTP_PROXY env on n8n, this is just a
  # bystander.
  squid:
    image: ubuntu/squid:latest
    restart: unless-stopped
    volumes:
      - ./squid.conf:/etc/squid/squid.conf:ro
    networks:
      - public
      - private

  # --- Internal-only service ------------------------------------------
  # On `private` only. Reachable from squid; NOT reachable from n8n.
  internal-api:
    image: traefik/whoami:latest
    restart: unless-stopped
    command: ["--port=80", "--name=internal-api"]
    networks:
      - private

  # --- Cert generator (oneshot) ---------------------------------------
  # Generates a self-signed RSA cert into a named volume on first boot.
  # On subsequent boots it sees the cert already exists and exits 0
  # immediately. No keys live in the repo.
  cert-init:
    image: alpine/openssl:latest
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        if [ ! -f /certs/server.crt ]; then
          echo "cert-init: generating self-signed cert"
          openssl req -x509 -newkey rsa:2048 -nodes \
            -keyout /certs/server.key \
            -out    /certs/server.crt \
            -days 365 \
            -subj "/CN=self-signed.local" \
            -addext "subjectAltName=DNS:self-signed,DNS:self-signed-server,DNS:self-signed.local,DNS:localhost"
          chmod 0644 /certs/server.crt
          chmod 0644 /certs/server.key
        else
          echo "cert-init: cert already present, skipping"
        fi
    volumes:
      - certs:/certs

  # --- HTTPS server with the self-signed cert -------------------------
  self-signed-nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ./nginx-ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - certs:/etc/nginx/certs:ro
    networks:
      public:
        aliases:
          - self-signed
          - self-signed-server
          - self-signed.local
    depends_on:
      cert-init:
        condition: service_completed_successfully

networks:
  public:
  private:

volumes:
  n8n_data:
  certs:
