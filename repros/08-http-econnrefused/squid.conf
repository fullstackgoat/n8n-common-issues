# Minimal Squid config for Repro 08, scenario 2 (corporate proxy).
# This is a permissive forward proxy — fine for the repro, NOT a model
# for production. Real corporate proxies authenticate, log, and ACL by
# destination/port.

http_port 3128

# Allow forwarding from any container on the bridge networks Squid sits on.
# In production you'd ACL by source CIDR.
acl docker_clients src 0.0.0.0/0
http_access allow docker_clients

# Allow CONNECT (HTTPS tunneling) to standard TLS ports.
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT
http_access deny CONNECT !SSL_ports
http_access deny !Safe_ports

# Quiet logging — repros are noisy enough already.
access_log none
cache_log /dev/null
cache deny all

# Resolve hostnames using Docker's embedded DNS (127.0.0.11 inside containers).
# Squid sits on both `public` and `private` networks, so it can resolve and
# reach `internal-api` even though n8n on `public` alone cannot.
dns_nameservers 127.0.0.11

# Last rule — deny anything not explicitly allowed above.
http_access deny all
